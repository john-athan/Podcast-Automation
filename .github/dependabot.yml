version: 2
updates:
  # Python dependencies declared in pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # One PR for all non-breaking (minor + patch) Python updates
      pip-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in the workflows below
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # One PR for all GitHub Actions updates
      github-actions-all:
        patterns:
          - "*"
