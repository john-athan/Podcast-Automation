name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Mondays 12:30 UTC
    - cron: "30 12 * * 1"

permissions:
  # Required by the reusable workflows to upload results to code scanning.
  actions: read
  contents: read
  security-events: write

jobs:
  # Full recursive scan (pyproject.toml / any manifests) on push + weekly cron.
  scan-scheduled:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8"

  # Diff-aware scan on pull requests.
  scan-pr:
    if: ${{ github.event_name == 'pull_request' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8"
