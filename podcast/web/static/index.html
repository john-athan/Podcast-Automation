<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bulletin Desk — local news console</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📻</text></svg>">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <div class="brand"><b>BULLETIN&nbsp;DESK</b><span class="v mono">local · v2</span></div>
    <span class="tally" id="tally"><span class="dot"></span><span id="tallyText">OFF AIR</span></span>
    <div class="spacer"></div>
    <div class="clock"><div class="t mono" id="clk">--:--:--</div><div class="d" id="clkDate">—</div></div>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle colour theme">◐ Theme</button>
  </header>

  <div class="console">
    <!-- LEFT: pipeline -->
    <div class="col rail">
      <div class="card">
        <div class="hd"><h2>Pipeline</h2><span class="eyebrow" id="stageCount">8 stages</span></div>
        <ul class="pipe" id="pipe"></ul>
        <div class="runbar" id="runbar"></div>
      </div>
    </div>

    <!-- CENTER: running order -->
    <div class="col center">
      <div id="health"></div>
      <div>
        <div class="ro-hd">
          <h1>Running order</h1>
          <div class="ro-actions">
            <span class="eyebrow mono" id="epId">—</span>
            <button class="mini-btn" id="editBtn">Edit</button>
          </div>
        </div>
        <div class="ro-meta" id="roMeta"></div>
      </div>
      <div id="fcSummary"></div>
      <div id="segments"></div>
    </div>

    <!-- RIGHT: output + voices + config -->
    <div class="col right">
      <div class="card">
        <div class="hd"><h2>Output</h2><span class="eyebrow">episode.wav</span></div>
        <div class="bd">
          <div class="wave empty" id="wave" aria-hidden="true">no episode yet</div>
          <div class="transport">
            <button class="play" id="playBtn" aria-label="Play episode" disabled>▶</button>
            <span class="ttime mono" id="cur">00:00</span>
            <div class="scrub" id="scrub"><i id="scrubFill"></i></div>
            <span class="ttime mono" id="dur">00:00</span>
          </div>
          <div class="lufs">
            <span class="eyebrow">LUFS</span>
            <div class="meter"><span class="mask" id="lufsMask"></span><span class="tgt"></span></div>
            <span class="mono" id="lufsVal" style="font-size:12px;font-weight:700">—</span>
          </div>
          <dl class="kv" id="outMeta"></dl>
        </div>
      </div>

      <div class="card">
        <div class="hd"><h2>Voices</h2></div>
        <div class="bd" id="voices" style="padding-top:6px;padding-bottom:6px"></div>
      </div>

      <div class="card">
        <div class="hd"><h2>Run config</h2><span class="eyebrow">.env</span></div>
        <div class="bd" id="config"></div>
      </div>
    </div>
  </div>

  <div class="logdock" id="logdock">
    <div class="logbar" id="logbar">
      <span class="eyebrow">Console log</span>
      <span class="last mono" id="logLast">idle</span>
      <span class="caret" id="logCaret">▲</span>
    </div>
    <div class="logbody" id="logbody"></div>
  </div>

  <div class="toast" id="toast"></div>
  <audio id="audio" preload="none"></audio>

  <script src="/app.js"></script>
</body>
</html>
