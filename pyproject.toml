[project]
name = "podcast-automation"
version = "2.0.0"
description = "Fully-local podcast generator: RSS -> LM Studio script -> VibeVoice MLX audio."
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "feedparser>=6.0",
    "openai>=1.51",          # client only; points at local LM Studio
    "pydantic>=2.9",
    "python-dotenv>=1.0",
    "mlx-audio>=0.2",        # VibeVoice on Apple Silicon
    "soundfile>=0.12",
    "numpy>=1.26",
]

[project.optional-dependencies]
publish = ["PyDrive2>=1.20"]   # Google Drive upload (optional)

[project.scripts]
podcast = "podcast.pipeline:main"

[tool.setuptools]
packages = ["podcast"]
